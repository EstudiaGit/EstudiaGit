name: Generate Snake Animation

on:
  # Ejecuta automáticamente cada 24 horas a la medianoche UTC
  schedule:
    - cron: "0 0 * * *"
  
  # Permite ejecutarlo manualmente desde la pestaña "Actions"
  workflow_dispatch:
  
  # Ejecuta al hacer push a la rama principal
  push:
    branches:
    - main
    - master

# IMPORTANTE: Estos permisos son obligatorios para que la Action pueda subir la imagen a tu repositorio.
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: EstudiaGit
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=cyan&color_dots=#30363d,#0e4429,#006d32,#26a641,#39d353

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
